<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Tenant RAG Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .chat-container { height: calc(100vh - 180px); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <!-- Auth Section -->
    <div id="auth-section" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <h1 class="text-3xl font-bold text-center mb-6 text-indigo-600">RagPlatform</h1>
            
            <div id="login-form">
                <h2 class="text-xl font-semibold mb-4">Login</h2>
                <div class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="password" id="login-password" placeholder="Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button onclick="login()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Login</button>
                    <p class="text-center text-sm">Don't have an account? <button onclick="toggleAuth(false)" class="text-indigo-600 font-medium">Register</button></p>
                </div>
            </div>

            <div id="register-form" class="hidden">
                <h2 class="text-xl font-semibold mb-4">Register Tenant</h2>
                <div class="space-y-4">
                    <input type="text" id="reg-tenant-id" placeholder="Tenant ID (e.g. acme-corp)" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="text" id="reg-tenant-name" placeholder="Company Name" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="email" id="reg-email" placeholder="Admin Email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <input type="password" id="reg-password" placeholder="Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <button onclick="register()" class="w-full bg-indigo-600 text-white p-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Register</button>
                    <p class="text-center text-sm">Already registered? <button onclick="toggleAuth(true)" class="text-indigo-600 font-medium">Login</button></p>
                </div>
            </div>
        </div>
    </div>

    <!-- App Section -->
    <div id="app-section" class="hidden flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-indigo-900 text-white flex flex-col">
            <div class="p-6">
                <h1 class="text-xl font-bold">RagPlatform</h1>
                <p id="display-tenant" class="text-xs text-indigo-300 mt-1 uppercase tracking-wider"></p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="showTab('chat')" class="tab-btn w-full text-left p-3 rounded-lg bg-indigo-800 text-white">
                    <span class="flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                        Chat
                    </span>
                </button>
                <button onclick="showTab('documents')" class="tab-btn w-full text-left p-3 rounded-lg hover:bg-indigo-800 transition">
                    <span class="flex items-center gap-3">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        Documents
                    </span>
                </button>
            </nav>

            <div class="p-4 border-t border-indigo-800">
                <button onclick="logout()" class="flex items-center gap-3 text-indigo-300 hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    Logout
                </button>
            </div>
        </div>

        <!-- Content Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Chat Tab -->
            <div id="chat-tab" class="flex-1 flex flex-col p-6 overflow-hidden">
                <div id="chat-messages" class="flex-1 overflow-y-auto pr-4 space-y-4 scrollbar-hide">
                    <!-- Messages will appear here -->
                    <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl max-w-2xl">
                        <p class="text-sm">Hello! I'm your RAG assistant. Upload documents in the Documents tab, and I'll answer questions based on them.</p>
                    </div>
                </div>

                <div class="mt-4 flex gap-3 p-4 bg-white rounded-xl shadow-lg border border-gray-100">
                    <input type="text" id="chat-input" onkeypress="if(event.key==='Enter') sendMessage()" placeholder="Ask a question about your documents..." class="flex-1 outline-none">
                    <button onclick="sendMessage()" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Send</button>
                </div>
            </div>

            <!-- Documents Tab -->
            <div id="documents-tab" class="hidden flex-1 p-8 overflow-y-auto">
                <div class="max-w-4xl mx-auto">
                    <h2 class="text-2xl font-bold mb-6">Documents</h2>
                    
                    <!-- Upload Area -->
                    <div id="drop-zone" class="border-2 border-dashed border-indigo-200 rounded-2xl p-10 text-center hover:bg-indigo-50 transition cursor-pointer mb-8">
                        <input type="file" id="file-input" class="hidden" multiple accept=".pdf,.docx,.txt,.csv">
                        <div class="text-indigo-600 mb-2">
                            <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        </div>
                        <p class="text-lg font-medium">Click to upload or drag and drop</p>
                        <p class="text-sm text-gray-500">PDF, DOCX, TXT, CSV (Max 10MB)</p>
                    </div>

                    <!-- Progress Bar -->
                    <div id="upload-progress-container" class="hidden mb-6">
                        <p class="text-sm mb-1 font-medium text-indigo-600">Uploading...</p>
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div id="upload-progress" class="bg-indigo-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>

                    <!-- Document List -->
                    <div id="doc-list" class="space-y-3">
                        <!-- Docs will appear here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token');
        let tenantId = localStorage.getItem('tenantId');

        // Check auth on load
        window.onload = () => {
            if (token) {
                showApp();
            }
        };

        function toggleAuth(showLogin) {
            document.getElementById('login-form').classList.toggle('hidden', !showLogin);
            document.getElementById('register-form').classList.toggle('hidden', showLogin);
        }

        async function register() {
            const formData = new FormData();
            formData.append('tenant_id', document.getElementById('reg-tenant-id').value);
            formData.append('tenant_name', document.getElementById('reg-tenant-name').value);
            formData.append('email', document.getElementById('reg-email').value);
            formData.append('password', document.getElementById('reg-password').value);

            try {
                const res = await fetch('/auth/register', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    alert('Registration successful! Please login.');
                    toggleAuth(true);
                } else {
                    alert(data.detail);
                }
            } catch (e) {
                alert('Network error during registration');
            }
        }

        async function login() {
            const formData = new FormData();
            formData.append('email', document.getElementById('login-email').value);
            formData.append('password', document.getElementById('login-password').value);

            try {
                const res = await fetch('/auth/login', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    token = data.access_token;
                    tenantId = data.tenant_id;
                    localStorage.setItem('token', token);
                    localStorage.setItem('tenantId', tenantId);
                    showApp();
                } else {
                    alert(data.detail);
                }
            } catch (e) {
                alert('Network error during login');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('tenantId');
            location.reload();
        }

        function showApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('display-tenant').innerText = tenantId;
            loadDocuments();
            loadChatHistory();
        }

        function showTab(tab) {
            document.getElementById('chat-tab').classList.toggle('hidden', tab !== 'chat');
            document.getElementById('documents-tab').classList.toggle('hidden', tab !== 'documents');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('bg-indigo-800', btn.innerText.toLowerCase().includes(tab));
            });
        }

        // Documents Logic
        async function loadDocuments() {
            const res = await fetch('/documents', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const docs = await res.json();
            const container = document.getElementById('doc-list');
            container.innerHTML = docs.length ? '' : '<p class="text-gray-400 text-center py-8">No documents uploaded yet.</p>';
            
            docs.forEach(doc => {
                const typeColor = {
                    'pdf': 'bg-red-100 text-red-700',
                    'docx': 'bg-blue-100 text-blue-700',
                    'txt': 'bg-gray-100 text-gray-700',
                    'csv': 'bg-green-100 text-green-700'
                }[doc.file_type] || 'bg-gray-100 text-gray-700';

                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl border border-gray-100 flex items-center justify-between shadow-sm hover:shadow-md transition">
                        <div class="flex items-center gap-4">
                            <span class="px-2 py-1 rounded text-xs font-bold uppercase ${typeColor}">${doc.file_type}</span>
                            <div>
                                <p class="font-medium">${doc.filename}</p>
                                <p class="text-xs text-gray-400">${new Date(doc.created_at).toLocaleString()}</p>
                            </div>
                        </div>
                        <button onclick="deleteDoc(${doc.id})" class="text-gray-400 hover:text-red-600 transition p-2">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
            });
        }

        // Drag and Drop
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-indigo-50'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-indigo-50');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50');
            handleFiles(e.dataTransfer.files);
        };
        fileInput.onchange = (e) => handleFiles(e.target.files);

        async function handleFiles(files) {
            const progressContainer = document.getElementById('upload-progress-container');
            const progressBar = document.getElementById('upload-progress');
            progressContainer.classList.remove('hidden');

            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('file', files[i]);

                try {
                    const res = await fetch('/documents/upload', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    if (!res.ok) alert(`Error uploading ${files[i].name}`);
                } catch (e) {
                    alert('Upload failed');
                }
                progressBar.style.width = `${((i + 1) / files.length) * 100}%`;
            }
            
            setTimeout(() => {
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
                loadDocuments();
            }, 1000);
        }

        async function deleteDoc(id) {
            if (!confirm('Are you sure you want to delete this document?')) return;
            await fetch(`/documents/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadDocuments();
        }

        // Chat Logic
        async function loadChatHistory() {
            const res = await fetch('/chat/history', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const history = await res.json();
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            history.forEach(msg => appendMessage(msg.role, msg.content));
            container.scrollTop = container.scrollHeight;
        }

        function appendMessage(role, content, citations = null) {
            const container = document.getElementById('chat-messages');
            const isUser = role === 'user';
            
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            let citationHtml = '';
            if (citations && citations.length) {
                citationHtml = `<div class="mt-2 pt-2 border-t border-indigo-100 text-[10px] text-indigo-500 font-medium">
                    Sources: ${citations.map(c => `${c.filename} (p. ${c.page})`).join(', ')}
                </div>`;
            }

            div.innerHTML = `
                <div class="${isUser ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-100'} p-4 rounded-2xl max-w-[80%] shadow-sm">
                    <p class="text-sm whitespace-pre-wrap">${content}</p>
                    ${citationHtml}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const question = input.value.trim();
            if (!question) return;

            input.value = '';
            appendMessage('user', question);

            const formData = new FormData();
            formData.append('question', question);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantMsgDiv = null;
                let assistantContent = '';
                let citations = [];

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.slice(6);
                            if (dataStr === '[DONE]') continue;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.type === 'citations') {
                                    citations = data.content;
                                } else if (data.type === 'chunk') {
                                    assistantContent += data.content;
                                    if (!assistantMsgDiv) {
                                        assistantMsgDiv = appendMessage('assistant', assistantContent, citations);
                                    } else {
                                        assistantMsgDiv.querySelector('p').innerText = assistantContent;
                                        // Update citations at the end if not already updated
                                        if (citations.length && !assistantMsgDiv.querySelector('.mt-2')) {
                                            const citDiv = document.createElement('div');
                                            citDiv.className = 'mt-2 pt-2 border-t border-indigo-100 text-[10px] text-indigo-500 font-medium';
                                            citDiv.innerText = 'Sources: ' + citations.map(c => `${c.filename} (p. ${c.page})`).join(', ');
                                            assistantMsgDiv.querySelector('div').appendChild(citDiv);
                                        }
                                    }
                                    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
            } catch (e) {
                alert('Communication error');
            }
        }
    </script>
</body>
</html>
